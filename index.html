<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frieda Hoffmann - Digging Up the Past</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .khmer {
            font-family: 'Battambang', cursive;
        }
        /* 16:9 Aspect Ratio Container */
        .presentation-container {
            aspect-ratio: 16 / 9;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }
        @media (max-width: 1024px) {
            .presentation-container {
                aspect-ratio: auto;
                min-height: 80vh;
            }
        }
        .tab-active {
            border-bottom: 4px solid #3b82f6;
            color: #1e40af;
        }
        .flashcard-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flashcard-flipped {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Main Header -->
    <header class="text-center mb-6">
        <h1 class="text-4xl font-bold text-gray-800">Frieda Hoffmann</h1>
        <p class="text-xl text-blue-600 font-medium">Pre-Intermediate</p>
    </header>

    <!-- Presentation App -->
    <main class="presentation-container bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col border border-gray-200">
        
        <!-- Navigation Tabs -->
        <nav class="flex bg-gray-50 border-b border-gray-200">
            <button onclick="switchTab('vocab')" id="tab-vocab" class="flex-1 py-4 font-semibold transition-all tab-active">Vocabulary</button>
            <button onclick="switchTab('flash')" id="tab-flash" class="flex-1 py-4 font-semibold transition-all text-gray-500 hover:bg-gray-100">Flashcards</button>
            <button onclick="switchTab('practice')" id="tab-practice" class="flex-1 py-4 font-semibold transition-all text-gray-500 hover:bg-gray-100">Practice Exercise</button>
        </nav>

        <!-- Content Area -->
        <div class="flex-grow p-6 overflow-y-auto">
            
            <!-- Tab 1: Vocabulary -->
            <section id="content-vocab" class="block">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="font-bold text-gray-500 uppercase tracking-wider text-sm border-b pb-2 px-2">Word (POS)</div>
                    <div class="font-bold text-blue-900 uppercase tracking-wider text-sm border-b pb-2 px-2">IPA</div>
                    <div class="font-bold text-red-600 uppercase tracking-wider text-sm border-b pb-2 px-2">Khmer Translation</div>
                </div>
                <div id="vocab-list" class="divide-y">
                    <!-- Loaded via JS -->
                </div>
            </section>

            <!-- Tab 2: Flashcards -->
            <section id="content-flash" class="hidden h-full flex flex-col items-center justify-center">
                <div class="relative w-80 h-48 cursor-pointer group" onclick="this.querySelector('.flashcard-inner').classList.toggle('flashcard-flipped')">
                    <div class="flashcard-inner w-full h-full relative">
                        <!-- Front -->
                        <div class="flashcard-front bg-blue-50 border-2 border-blue-200 rounded-xl flex flex-col items-center justify-center shadow-lg p-6">
                            <span id="card-word" class="text-3xl font-bold text-gray-700">Word</span>
                            <span class="text-xs text-blue-400 mt-4 uppercase">Click to Flip</span>
                        </div>
                        <!-- Back -->
                        <div class="flashcard-back bg-white border-2 border-red-200 rounded-xl flex flex-col items-center justify-center shadow-lg p-6">
                            <span id="card-ipa" class="text-blue-900 font-medium mb-2">IPA</span>
                            <span id="card-khmer" class="text-2xl font-bold text-red-600 khmer">Translation</span>
                        </div>
                    </div>
                </div>
                <div class="mt-8 flex gap-4">
                    <button onclick="prevCard()" class="px-6 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 transition font-bold">Prev</button>
                    <button onclick="nextCard()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-bold">Next</button>
                </div>
                <p class="mt-4 text-gray-400 text-sm">Card <span id="card-index">1</span> of 11</p>
            </section>

            <!-- Tab 3: Practice -->
            <section id="content-practice" class="hidden h-full">
                <h2 class="text-xl font-bold text-gray-700 mb-4">Fill in the gaps with the correct words:</h2>
                <div id="exercise-list" class="space-y-4 pb-8">
                    <!-- Loaded via JS -->
                </div>
                <div class="mt-6 sticky bottom-0 bg-white pt-4 border-t">
                    <button onclick="checkAnswers()" class="px-8 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 shadow-lg">Check Answers</button>
                    <span id="score-display" class="ml-4 font-bold text-xl text-blue-800"></span>
                </div>
            </section>

        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center mt-6 text-gray-500 font-medium">
        © GIA School!
    </footer>

    <script>
        const vocabulary = [
            { word: "Archaeologist", pos: "(n)", ipa: "/ˌɑːkiˈɒlədʒɪst/", khmer: "អ្នកបុរាណវិទូ" },
            { word: "Archaeology", pos: "(n)", ipa: "/ˌɑːkiˈɒlədʒi/", khmer: "បុរាណវិទ្យា" },
            { word: "Abroad", pos: "(adv)", ipa: "/əˈbrɔːd/", khmer: "នៅឯបរទេស" },
            { word: "Passion", pos: "(n)", ipa: "/ˈpæʃn/", khmer: "ចំណង់ចំណូលចិត្តខ្លាំង" },
            { word: "Ancient", pos: "(adj)", ipa: "/ˈeɪnʃənt/", khmer: "បុរាណ" },
            { word: "Discovery", pos: "(n)", ipa: "/dɪˈskʌvəri/", khmer: "ការរកឃើញ" },
            { word: "Lifetime", pos: "(n)", ipa: "/ˈlaɪftaɪm/", khmer: "មួយជីវិត" },
            { word: "Exhibition", pos: "(n)", ipa: "/ˌeksɪˈbɪʃn/", khmer: "ពិព័រណ៍" },
            { word: "Fascinated", pos: "(adj)", ipa: "/ˈfæsɪneɪtɪd/", khmer: "ដែលចាប់ចិត្តខ្លាំង" },
            { word: "Tomb", pos: "(n)", ipa: "/tuːm/", khmer: "ផ្នូរ" },
            { word: "Danger", pos: "(n)", ipa: "/ˈdeɪndʒə(r)/", khmer: "គ្រោះថ្នាក់" }
        ];

        let shuffledCards = [...vocabulary];
        let currentCardIndex = 0;

        const practiceQuestions = [
            { sentence: "Howard Carter was a famous ______ who found Tutankhamun.", answer: "archaeologist" },
            { sentence: "The ______ of the lost city was reported in all the newspapers.", answer: "discovery" },
            { sentence: "Frieda has a real ______ for her work in Egypt.", answer: "passion" },
            { sentence: "The museum is holding an ______ of Egyptian artifacts.", answer: "exhibition" },
            { sentence: "I've been ______ by history since I was a young child.", answer: "fascinated" },
            { sentence: "They traveled ______ to study new cultures in Europe.", answer: "abroad" },
            { sentence: "The ______ pyramids are thousands of years old.", answer: "ancient" },
            { sentence: "It was the chance of a ______ to visit the Valley of the Kings.", answer: "lifetime" },
            { sentence: "The explorer walked carefully through the dark ______.", answer: "tomb" },
            { sentence: "Archaeologists often work in places of great ______.", answer: "danger" }
        ];

        // Initialize App
        window.onload = () => {
            renderVocab();
            shuffle(shuffledCards);
            updateCard();
            renderPractice();
        };

        function switchTab(tabId) {
            ['vocab', 'flash', 'practice'].forEach(id => {
                document.getElementById(`content-${id}`).classList.add('hidden');
                document.getElementById(`tab-${id}`).classList.remove('tab-active', 'text-blue-800');
                document.getElementById(`tab-${id}`).classList.add('text-gray-500');
            });
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('tab-active', 'text-blue-800');
        }

        function renderVocab() {
            const list = document.getElementById('vocab-list');
            vocabulary.forEach(v => {
                const row = document.createElement('div');
                row.className = "grid grid-cols-1 md:grid-cols-3 gap-4 py-3 px-2 items-center hover:bg-gray-50";
                row.innerHTML = `
                    <div class="text-gray-500 font-semibold">${v.word} <span class="text-xs italic opacity-70">${v.pos}</span></div>
                    <div class="text-blue-900 font-medium">${v.ipa}</div>
                    <div class="text-red-600 khmer font-bold">${v.khmer}</div>
                `;
                list.appendChild(row);
            });
        }

        function shuffle(array) {
            array.sort(() => Math.random() - 0.5);
        }

        function updateCard() {
            const card = shuffledCards[currentCardIndex];
            document.getElementById('card-word').innerText = card.word;
            document.getElementById('card-ipa').innerText = card.ipa;
            document.getElementById('card-khmer').innerText = card.khmer;
            document.getElementById('card-index').innerText = currentCardIndex + 1;
            // Reset flip state when changing card
            document.querySelector('.flashcard-inner').classList.remove('flashcard-flipped');
        }

        function nextCard() {
            currentCardIndex = (currentCardIndex + 1) % shuffledCards.length;
            updateCard();
        }

        function prevCard() {
            currentCardIndex = (currentCardIndex - 1 + shuffledCards.length) % shuffledCards.length;
            updateCard();
        }

        function renderPractice() {
            const list = document.getElementById('exercise-list');
            practiceQuestions.forEach((q, index) => {
                const item = document.createElement('div');
                item.className = "p-4 bg-gray-50 rounded-lg border border-gray-100 flex flex-wrap items-center gap-2";
                const parts = q.sentence.split('______');
                item.innerHTML = `
                    <span class="font-bold text-gray-400 mr-2">${index + 1}.</span>
                    <span>${parts[0]}</span>
                    <input type="text" data-answer="${q.answer}" class="gap-input border-b-2 border-blue-300 bg-transparent focus:border-blue-600 outline-none px-2 w-40 text-blue-700 font-bold text-center" />
                    <span>${parts[1]}</span>
                `;
                list.appendChild(item);
            });
        }

        function checkAnswers() {
            const inputs = document.querySelectorAll('.gap-input');
            let correct = 0;
            inputs.forEach(input => {
                const val = input.value.trim().toLowerCase();
                const ans = input.dataset.answer.toLowerCase();
                if (val === ans) {
                    input.className = "gap-input border-b-2 border-green-500 bg-green-50 outline-none px-2 w-40 text-green-700 font-bold text-center";
                    correct++;
                } else {
                    input.className = "gap-input border-b-2 border-red-500 bg-red-50 outline-none px-2 w-40 text-red-700 font-bold text-center";
                }
            });
            document.getElementById('score-display').innerText = `Score: ${correct} / ${practiceQuestions.length}`;
        }
    </script>
</body>
</html>
